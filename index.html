<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลสุขภาพนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">ฟอร์มเก็บข้อมูลสุขภาพนักเรียน</h2>
        
        <form id="healthForm" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เลขประจำตัวนักเรียน (5 หลัก)</label>
                <input type="text" id="studentId" name="studentId" pattern="\d{5}" maxlength="5" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    placeholder="e.g. 12345">
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">คำนำหน้า</label>
                    <select id="prefix" name="prefix" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="เด็กชาย">ด.ช.</option>
                        <option value="เด็กหญิง">ด.ญ.</option>
                        <option value="นาย">นาย</option>
                        <option value="นางสาว">น.ส.</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ</label>
                    <input type="text" id="firstName" name="firstName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">นามสกุล</label>
                    <input type="text" id="lastName" name="lastName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชั้น ม.ปีที่</label>
                    <select id="grade" name="grade" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ห้อง</label>
                    <input type="number" id="room" name="room" min="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">เลขที่</label>
                    <input type="number" id="no" name="no" min="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="1">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">น้ำหนัก (ก.ก.)</label>
                    <input type="number" id="weight" name="weight" step="0.1" min="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="50.5">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ส่วนสูง (ซ.ม.)</label>
                    <input type="number" id="height" name="height" step="0.1" min="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="165.0">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 mt-4 shadow-md">
                บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script>
        // URL ของ Google Apps Script ที่คุณให้มา
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhXCNZasbLnj3lUqV42coyeP7oihuvvxLeUemxQoFMfjUhf9CJ6sRKgKG1pyN1j66B/exec";

        document.getElementById('healthForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันฟอร์มรีโหลดหน้าเว็บหลัก

            // 1. แสดง SweetAlert2 สถานะกำลังโหลด/กำลังบันทึกข้อมูล
            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'โปรดรอสักครู่ ระบบกำลังนำส่งข้อมูลสุขภาพ',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading(); // แสดงสัญลักษณ์หมุนๆ
                }
            });

            // 2. ดึงข้อมูลจากฟอร์มมาใส่ตัวแปร Object
            const studentData = {
                studentId: document.getElementById('studentId').value,
                prefix: document.getElementById('prefix').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                grade: document.getElementById('grade').value,
                room: document.getElementById('room').value,
                no: document.getElementById('no').value,
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value
            };

            // ชื่อฟังก์ชัน Callback ที่จะให้ฝั่ง App Script เรียกกลับมาตอนทำงานเสร็จ (เพื่อรองรับ JSONP)
            const callbackName = 'jsonpCallback_' + Date.now();

            // 3. สร้างฟังก์ชัน Callback นี้รอไว้ใน window object เพื่อให้สคริปต์ปลายทางเรียกใช้
            window[callbackName] = function(response) {
                // เมื่อได้รับข้อมูลตอบกลับสำเร็จ
                if (response.result === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ!',
                        text: 'ข้อมูลสุขภาพถูกบันทึกลงระบบเรียบร้อยแล้ว',
                        confirmButtonText: 'ตกลง'
                    });
                    document.getElementById('healthForm').reset(); // เคลียร์ข้อมูลในฟอร์มออก
                } else {
                    // หากฝั่งเซิร์ฟเวอร์แจ้งข้อผิดพลาดมา
                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: response.message || 'ไม่สามารถบันทึกข้อมูลได้',
                    });
                }
                
                // ลบแท็ก script และฟังก์ชันชั่วคราวออกเพื่อคืน Memory
                document.getElementById(callbackName).remove();
                delete window[callbackName];
            };

            // 4. แปลงข้อมูล Object เป็น Query String เพื่อต่อท้าย URL
            const queryString = Object.keys(studentData)
                .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(studentData[key]))
                .join('&');

            // 5. เทคนิค JSONP: สร้างแท็ก <script> และยัด URL ที่มีข้อมูล + ชื่อ callback ไปยังเอกสารเว็บ
            const script = document.createElement('script');
            script.id = callbackName;
            // รูปแบบ URL: WEB_APP_URL?callback=ชื่อฟังก์ชัน&ข้อมูลต่างๆ
            script.src = `${WEB_APP_URL}?callback=${callbackName}&${queryString}`;

            // จัดการกรณีที่สคริปต์โหลดไม่สำเร็จ (เช่น เน็ตหลุด หรือ URL ผิดพลาด)
            script.onerror = function() {
                Swal.fire({
                    icon: 'error',
                    title: 'การเชื่อมต่อล้มเหลว',
                    text: 'ไม่สามารถติดต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
                });
                delete window[callbackName];
                script.remove();
            };

            // นำแท็ก script ใส่เข้าไปในส่วน body เพื่อเริ่มทำงาน (ส่งคำขอไปยัง App Script)
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
